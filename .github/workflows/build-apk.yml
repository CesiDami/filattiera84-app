name: Build APK — IC Filattiera 84

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Crea struttura progetto Android
        run: |
          mkdir -p app/src/main/java/it/edu/filattiera84/app
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap-hdpi

          # Copia l'app web negli assets
          if [ -d filattiera84-app/src ]; then
            cp -r filattiera84-app/src/* app/src/main/assets/
          elif [ -f filattiera84-app/src/index.html ]; then
            cp filattiera84-app/src/index.html app/src/main/assets/
          else
            # Crea index.html minimale di fallback
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>IC Filattiera 84</title></head><body style="margin:0;background:#003366;color:white;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center"><div><h1>IC P.zza Filattiera 84</h1><p>Roma</p><a href="https://www.filattiera84.edu.it" style="color:#f5a623">Vai al sito</a></div></body></html>' > app/src/main/assets/index.html
          fi

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
            <application
              android:allowBackup="true"
              android:icon="@mipmap/ic_launcher"
              android:label="@string/app_name"
              android:theme="@style/AppTheme"
              android:usesCleartextTraffic="false">
              <activity
                android:name=".MainActivity"
                android:exported="true"
                android:configChanges="orientation|screenSize">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          # MainActivity.java
          cat > app/src/main/java/it/edu/filattiera84/app/MainActivity.java << 'EOF'
          package it.edu.filattiera84.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          public class MainActivity extends Activity {
            private WebView webView;
            @Override
            protected void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              webView = new WebView(this);
              WebSettings s = webView.getSettings();
              s.setJavaScriptEnabled(true);
              s.setDomStorageEnabled(true);
              s.setAllowFileAccessFromFileURLs(true);
              s.setAllowUniversalAccessFromFileURLs(true);
              webView.setWebViewClient(new WebViewClient());
              setContentView(webView);
              webView.loadUrl("file:///android_asset/index.html");
            }
            @Override public void onBackPressed() {
              if (webView.canGoBack()) webView.goBack();
              else super.onBackPressed();
            }
          }
          EOF

          # strings.xml
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">IC Filattiera 84</string></resources>
          EOF

          # styles.xml
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="colorPrimary">#003366</item>
              <item name="android:statusBarColor">#003366</item>
            </style>
          </resources>
          EOF

          # Icona placeholder (PNG 1x1 blu)
          python3 -c "
          import struct, zlib
          def png
