<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>IC Filattiera 84</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --primary:#003366;
      --primary-light:#0055a5;
      --accent:#f5a623;
      --bg:#f0f4f8;
      --card:#ffffff;
      --text:#1a1a2e;
      --muted:#666;
      --radius:14px;
      --shadow:0 2px 12px rgba(0,0,0,.10);
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

    /* HEADER */
    .header{background:var(--primary);color:white;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));box-shadow:0 2px 8px rgba(0,0,0,.3);z-index:100;min-height:60px}
    .hlogo{display:flex;align-items:center;gap:10px}
    .hicon{width:38px;height:38px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
    .htitle{font-size:15px;font-weight:700;line-height:1.2}
    .hsub{font-size:11px;opacity:.8}
    .hbell{background:rgba(255,255,255,.15);border:none;color:white;width:38px;height:38px;border-radius:50%;font-size:18px;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center}
    .nbadge{position:absolute;top:4px;right:4px;background:var(--accent);color:white;border-radius:50%;width:14px;height:14px;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center}

    /* CONTENUTO */
    .content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
    .view{display:none;padding:16px}
    .view.active{display:block}

    /* BANNER */
    .banner{background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:var(--radius);padding:20px;color:white;margin-bottom:16px;position:relative;overflow:hidden}
    .banner::after{content:'🏫';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:48px;opacity:.2}
    .banner h2{font-size:18px;margin-bottom:4px}
    .banner p{font-size:13px;opacity:.85}

    .stitle{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 10px}

    /* GRIGLIA ACCESSI */
    .qgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:8px}
    .qcard{background:var(--card);border-radius:var(--radius);padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s;text-decoration:none;color:var(--text);border:none;width:100%}
    .qcard:active{transform:scale(.97)}
    .qicon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
    .qlabel{font-size:12px;font-weight:600;text-align:center;line-height:1.3}
    .q1 .qicon{background:#e8f4fd}
    .q2 .qicon{background:#fff3e0}
    .q3 .qicon{background:#e8f5e9}
    .q4 .qicon{background:#f3e5f5}
    .q5 .qicon{background:#fce4ec}
    .q6 .qicon{background:#e0f7fa}

    /* CIRCOLARI */
    .clist{display:flex;flex-direction:column;gap:10px}
    .citem{background:var(--card);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:transform .15s;text-decoration:none;color:var(--text)}
    .citem:active{transform:scale(.98)}
    .cbadge{background:var(--primary);color:white;border-radius:8px;padding:4px 8px;font-size:11px;font-weight:700;white-space:nowrap;min-width:44px;text-align:center;flex-shrink:0}
    .cbadge.new{background:#e53935}
    .cinfo{flex:1;min-width:0}
    .ctitle{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:3px}
    .cmeta{font-size:11px;color:var(--muted)}
    .carrow{font-size:16px;color:var(--muted);align-self:center}

    /* CALENDARIO */
    .calwrap{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
    .calnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .calnav button{background:var(--bg);border:none;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer}
    .calmth{font-size:16px;font-weight:700}
    .caldh{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:6px}
    .caldh span{font-size:11px;font-weight:600;color:var(--muted);padding:4px 0}
    .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
    .calday{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px;cursor:pointer;position:relative}
    .calday.today{background:var(--primary);color:white;font-weight:700}
    .calday.hasev::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--accent)}
    .calday.today.hasev::after{background:white}
    .calday.other{color:#ccc}
    .calday.sun{color:#e53935}
    .evlist{display:flex;flex-direction:column;gap:8px}
    .evitem{background:var(--card);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:flex-start}
    .evdot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
    .evbody{flex:1}
    .evtitle{font-size:13px;font-weight:600;margin-bottom:2px}
    .evdate{font-size:11px;color:var(--muted)}

    /* WEBVIEW */
    .wvbar{background:var(--primary);display:flex;align-items:center;gap:8px;padding:8px 12px}
    .wvbar button{background:rgba(255,255,255,.15);border:none;color:white;width:32px;height:32px;border-radius:6px;font-size:16px;cursor:pointer}
    .wvurl{flex:1;background:rgba(255,255,255,.12);border:none;color:white;font-size:12px;padding:6px 10px;border-radius:6px}
    .wvcont{height:calc(100vh - 60px - 56px)}
    #wvframe{width:100%;height:100%;border:none}

    /* BOTTOM NAV */
    .bnav{background:var(--card);display:flex;border-top:1px solid #e0e0e0;padding-bottom:env(safe-area-inset-bottom);z-index:100}
    .nitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;border:none;background:none;color:var(--muted);font-size:10px;font-weight:600;gap:3px;transition:color .2s}
    .nitem .ni{font-size:22px}
    .nitem.active{color:var(--primary)}

    /* PANNELLO NOTIFICHE */
    .npanel{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:999;display:none;align-items:flex-start;justify-content:flex-end}
    .npanel.open{display:flex}
    .nbox{background:white;width:85%;max-width:340px;height:100%;overflow-y:auto;box-shadow:-4px 0 20px rgba(0,0,0,.3)}
    .nboxh{background:var(--primary);color:white;padding:16px;padding-top:max(16px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between}
    .nboxh h3{font-size:16px}
    .nboxh button{background:none;border:none;color:white;font-size:22px;cursor:pointer}
    .nitem2{padding:14px 16px;border-bottom:1px solid #f0f0f0}
    .nitem2.unread{background:#e8f0fb}
    .nit{font-size:13px;font-weight:600;margin-bottom:3px}
    .nib{font-size:12px;color:var(--muted);line-height:1.4}
    .nitime{font-size:10px;color:#aaa;margin-top:4px}

    /* TOAST */
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:white;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s,transform .3s;z-index:9999;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{text-align:center;padding:30px;color:#aaa}
    .spinner .s{font-size:28px;animation:spin 1s linear infinite;display:inline-block}
  </style>
</head>
<body>

<div class="header">
  <div class="hlogo">
    <div class="hicon">🏫</div>
    <div>
      <div class="htitle">IC P.zza Filattiera</div>
      <div class="hsub">Roma · Scuola digitale</div>
    </div>
  </div>
  <button class="hbell" onclick="toggleNotif()">
    🔔<span class="nbadge" id="nbadge">0</span>
  </button>
</div>

<div class="content">

  <!-- ── HOME ── -->
  <div class="view active" id="view-home">
    <div class="banner">
      <h2>Benvenuto nell'app</h2>
      <p>IC Piazza Filattiera 84 · Roma</p>
    </div>

    <div class="stitle">🔗 Accessi rapidi</div>
    <div class="qgrid">

      <!-- Registro Famiglie (Axios — link ufficiale dal sito) -->
      <button class="qcard q1" onclick="openLink('https://registrofamiglie.axioscloud.it/Pages/SD/SD_Login.aspx?Customer_id=97713420582')">

      <!-- Registro Docenti (Axios — link ufficiale dal sito) -->
      <button class="qcard q2" onclick="openLink('https://registro.axioscloud.it/Pages/SD/SD_Login.aspx?Customer_id=97713420582')">

</div><!-- /content -->

<!-- MENU BASSO -->
<nav class="bnav">
  <button class="nitem active" id="nav-home"       onclick="sw('home')"><span class="ni">🏠</span>Home</button>
  <button class="nitem"        id="nav-circolari"  onclick="sw('circolari')"><span class="ni">📋</span>Circolari</button>
  <button class="nitem"        id="nav-calendario" onclick="sw('calendario')"><span class="ni">📅</span>Calendario</button>

</nav>

<!-- NOTIFICHE -->
<div class="npanel" id="npanel" onclick="closeNOut(event)">
  <div class="nbox">
    <div class="nboxh"><h3>🔔 Notifiche</h3><button onclick="toggleNotif()">✕</button></div>
    <div id="nlist"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── LINK UFFICIALI VERIFICATI ──────────────────────────────────────────
const LINKS = {
  sito:            'https://www.filattiera84.edu.it/',
  circolari:       'https://www.filattiera84.edu.it/circolare/',
  regFamiglie:     'https://registrofamiglie.axioscloud.it/Pages/SD/SD_Login.aspx?Customer_id=97713420582',
  regDocenti:      'https://registro.axioscloud.it/Pages/SD/SD_Login.aspx?Customer_id=97713420582',
  pagoInRete:      'https://www.istruzione.it/pagoinrete/',
  emailSegreteria: 'mailto:rmic8eg00q@istruzione.it',
  pec:             'mailto:rmic8eg00q@pec.istruzione.it',
  tel:             'tel:068102978',
};

const BASE = 'https://www.filattiera84.edu.it';
const API  = BASE + '/wp-json/wp/v2';
let NOTIFICHE = [{title:'Benvenuto!', body:"App ufficiale IC P.zza Filattiera 84 — Roma.", time:'', unread:false}];
const cache = {}, CACHE_TTL = 5*60*1000;

async function apiFetch(url, key) {
  const now = Date.now();
  if (cache[key] && (now - cache[key].ts) < CACHE_TTL) return cache[key].data;
  const res = await fetch(url, {headers:{'Accept':'application/json'}});
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  cache[key] = {data, ts: now};
  return data;
}

function dhtml(s) { const t=document.createElement('textarea'); t.innerHTML=s; return t.value; }
const ECOL = ['#e53935','#1565c0','#2e7d32','#e65100','#6a1b9a','#00838f','#f57f17'];

function parseCirc(p) {
  const raw   = dhtml(p.title?.rendered || '');
  const m     = raw.match(/[Cc]ircolare\s+(\d+)/);
  const num   = m ? m[1] : String(p.id);
  const title = raw.replace(/^[Cc]ircolare\s+\d+\s*[-\u2013]\s*/,'').trim() || raw;
  const tags  = p._embedded?.['wp:term']?.[1]?.map(t=>t.name) || [];
  const tipo  = tags[0] || 'Generale';
  const d     = new Date(p.date || '');
  const data  = d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  const isNew = (Date.now() - d.getTime()) < 7*24*3600*1000;
  return {num, title, data, tipo, isNew, url: p.link || LINKS.circolari};
}

function parseEv(p, i) {
  const title = dhtml(p.title?.rendered || '');
  const date  = (p.meta?.event_start || p.date || '').substring(0,10);
  return {title, date, color: ECOL[i % ECOL.length], url: p.link || BASE+'/evento/'};
}

function spinner(id) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = '<div class="spinner"><div class="s">⟳</div><div style="font-size:13px;margin-top:8px">Caricamento…</div></div>';
}

// ── RENDER CIRCOLARI ──────────────────────────────────────────────────
function renderCirc(id, items) {
  const el = document.getElementById(id); if (!el) return;
  if (!items.length) { el.innerHTML='<div style="color:#aaa;font-size:13px;text-align:center;padding:20px">Nessuna circolare disponibile</div>'; return; }
  el.innerHTML = items.map(c => `
    <a class="citem" href="${c.url}" onclick="openLink('${c.url}');return false;">
      <div class="cbadge ${c.isNew?'new':''}">N.${c.num}</div>
      <div class="cinfo">
        <div class="ctitle">${c.title}</div>
        <div class="cmeta">${c.data} · ${c.tipo}</div>
      </div>
      <div class="carrow">›</div>
    </a>`).join('');
}

// ── RENDER EVENTI ─────────────────────────────────────────────────────
function renderEv(id, evs) {
  const el = document.getElementById(id); if (!el) return;
  if (!evs.length) { el.innerHTML='<div style="color:#aaa;font-size:13px;text-align:center;padding:20px">Nessun evento in programma</div>'; return; }
  el.innerHTML = evs.map(e => `
    <div class="evitem">
      <div class="evdot" style="background:${e.color}"></div>
      <div class="evbody">
        <div class="evtitle">${e.title}</div>
        <div class="evdate">${new Date(e.date).toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
      </div>
    </div>`).join('');
}

// ── CALENDARIO ────────────────────────────────────────────────────────
let calDate = new Date();
const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

function renderCal() {
  const y=calDate.getFullYear(), m=calDate.getMonth();
  document.getElementById('calmth').textContent = MONTHS[m]+' '+y;
  const EV    = window._EV || [];
  const first = new Date(y,m,1).getDay();
  const days  = new Date(y,m+1,0).getDate();
  const off   = first===0 ? 6 : first-1;
  const today = new Date();
  const evdays = EV.filter(e=>{const d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===y;}).map(e=>new Date(e.date).getDate());
  let html='';
  for(let i=0;i<off;i++) html+='<div class="calday other"></div>';
  for(let d=1;d<=days;d++){
    const isT = d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    const hasE= evdays.includes(d);
    const sun = new Date(y,m,d).getDay()===0;
    html+=`<div class="calday ${isT?'today':''} ${hasE?'hasev':''} ${sun?'sun':''}">${d}</div>`;
  }
  document.getElementById('calgrid').innerHTML = html;
  renderEv('ev-month', EV.filter(e=>{const d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===y;}));
}
function changeMonth(d){calDate.setMonth(calDate.getMonth()+d);renderCal();}

// ── NOTIFICHE ─────────────────────────────────────────────────────────
function renderNotif() {
  document.getElementById('nlist').innerHTML = NOTIFICHE.map(n=>`
    <div class="nitem2 ${n.unread?'unread':''}">
      <div class="nit">${n.title}</div>
      <div class="nib">${n.body}</div>
      ${n.time ? `<div class="nitime">${n.time}</div>` : ''}
    </div>`).join('');
}
function toggleNotif(){
  const p=document.getElementById('npanel');
  p.classList.toggle('open');
  if(p.classList.contains('open')){
    document.getElementById('nbadge').style.display='none';
    NOTIFICHE.forEach(n=>n.unread=false);
  }
}
function closeNOut(e){if(e.target.id==='npanel')toggleNotif();}

// ── NAVIGAZIONE ───────────────────────────────────────────────────────
function sw(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nitem').forEach(n=>n.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='calendario') renderCal();
}

// ── LINK / WEBVIEW ────────────────────────────────────────────────────
function openLink(url){
  // mailto e tel aprono sempre l'app nativa del telefono
  if(url.startsWith('mailto:') || url.startsWith('tel:')){
    window.location.href = url;
    return;
  }
  if(window.Capacitor?.Plugins?.Browser) Capacitor.Plugins.Browser.open({url});
  else window.open(url,'_blank');
}
function wvBack(){try{document.getElementById('wvframe').contentWindow.history.back();}catch(e){}}
function wvRefresh(){const f=document.getElementById('wvframe');f.src=f.src;}

// ── TOAST ─────────────────────────────────────────────────────────────
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ── CARICA CIRCOLARI DAL SITO ─────────────────────────────────────────
async function loadCirc(){
  ['home-circ','all-circ'].forEach(spinner);
  try {
    const posts = await apiFetch(API+'/circolare?per_page=10&orderby=date&order=desc&_embed=1','circ');
    const circs = posts.map(parseCirc);

    // aggiorna notifiche con le nuove circolari
    circs.filter(c=>c.isNew).forEach(c=>{
      if(!NOTIFICHE.find(n=>n.title.includes('n.'+c.num)))
        NOTIFICHE.unshift({title:'Nuova circolare n.'+c.num, body:c.title, time:'recente', unread:true});
    });
    const nb = NOTIFICHE.filter(n=>n.unread).length;
    if(nb>0){const b=document.getElementById('nbadge');b.textContent=nb;b.style.display='flex';}
    renderNotif();

    renderCirc('home-circ', circs.slice(0,3));
    renderCirc('all-circ',  circs);
  } catch(err) {
    // Fallback: ultime circolari reali già note
    const fb = [

// ── CARICA EVENTI DAL SITO ────────────────────────────────────────────
async function loadEv(){
  spinner('home-ev');
  try {
    const posts = await apiFetch(API+'/evento?per_page=20&orderby=date&order=asc','ev');
    window._EV = posts.map(parseEv);
    renderEv('home-ev', window._EV.slice(0,3));
    renderCal();
  } catch(e) { window._EV=[]; renderCal(); }
}

// ── INIT ──────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  window._EV = [];
  renderCal();
  renderNotif();
  Promise.all([loadCirc(), loadEv()]);
});
